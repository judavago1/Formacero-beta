<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Información Empleados | Formacero RRHH</title>
    <link rel="stylesheet" href="css/informacion-empleados.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header class="header">
    <div class="logo">Formacero</div>
    <a href="dashboard.html" class="back-btn">← Volver al Panel</a>
</header>

<section class="hero">
    <h1>Información de Empleados</h1>
    <p>Gestión y consulta del personal activo</p>
</section>

<section class="filter-section">
    <input type="text" id="searchInput" placeholder="Buscar por nombre, cargo o departamento...">
</section>

<section class="table-section">
    <table>
        <thead>
            <tr>
                <th>Empleado</th>
                <th>Cargo</th>
                <th>Departamento</th>
                <th>Estado</th>
                <th>Documentos</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>

            <!-- EMPLEADO -->
            <tr class="employee-row">
                <td class="name">Juan Vargas</td>
                <td class="position">Gerente General</td>
                <td class="department">Dirección</td>
                <td><span class="status active">Activo</span></td>
                <td><button class="doc-btn">Ver documentos</button></td>
                <td>
                    <button class="edit-btn">Editar</button>
                    <button class="delete-btn">Eliminar</button>
                </td>
            </tr>
            <tr class="documents-row">
                <td colspan="6">
                    <div class="documents">
                        <p>📄 Contrato Laboral.pdf</p>
                        <p>📄 Hoja de Vida.pdf</p>
                        <p>📄 Evaluación 2025.pdf</p>
                    </div>
                </td>
            </tr>

        </tbody>
    </table>
</section>

<script>

/* ===============================
   ACORDEÓN
=================================*/

function initAccordion() {
    const buttons = document.querySelectorAll(".doc-btn");
    const allDocumentRows = document.querySelectorAll(".documents-row");

    buttons.forEach((button, index) => {

        button.onclick = function() {

            const currentRow = allDocumentRows[index];
            const isOpen = currentRow.classList.contains("open");

            allDocumentRows.forEach(row => row.classList.remove("open"));
            buttons.forEach(btn => btn.textContent = "Ver documentos");

            if (!isOpen) {
                currentRow.classList.add("open");
                this.textContent = "Ocultar documentos";
            }
        };
    });
}

/* ===============================
   EDITAR
=================================*/

function initEditButtons() {

    document.querySelectorAll(".edit-btn").forEach(button => {

        button.onclick = function() {

            const row = this.closest(".employee-row");

            const nameCell = row.querySelector(".name");
            const positionCell = row.querySelector(".position");
            const departmentCell = row.querySelector(".department");

            const newName = prompt("Editar nombre:", nameCell.textContent);
            const newPosition = prompt("Editar cargo:", positionCell.textContent);
            const newDepartment = prompt("Editar departamento:", departmentCell.textContent);

            if (newName) nameCell.textContent = newName;
            if (newPosition) positionCell.textContent = newPosition;
            if (newDepartment) departmentCell.textContent = newDepartment;
        };

    });
}

/* ===============================
   ELIMINAR
=================================*/

function initDeleteButtons() {

    document.querySelectorAll(".delete-btn").forEach(button => {

        button.onclick = function() {

            const row = this.closest(".employee-row");
            const documentRow = row.nextElementSibling;

            if (confirm("¿Seguro que deseas eliminar este empleado?")) {
                row.remove();
                documentRow.remove();
            }
        };

    });
}

/* ===============================
   FILTRO
=================================*/

document.getElementById("searchInput").addEventListener("keyup", function() {

    const filter = this.value.toLowerCase();
    const employeeRows = document.querySelectorAll(".employee-row");

    employeeRows.forEach((row) => {

        const text = row.textContent.toLowerCase();

        if (text.includes(filter)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
            row.nextElementSibling.classList.remove("open");
        }

    });

});

/* ===============================
   INICIALIZAR TODO
=================================*/

initAccordion();
initEditButtons();
initDeleteButtons();

</script>
</body>
</html>
