<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nómina</title>
    <link rel="stylesheet" href="/css/nomina.css">
</head>
<body>

<div class="contenedor-nomina">

    <h2>Generar Desprendible de Pago</h2>

    <label>Seleccionar empleado:</label>
    <select id="empleado">
        <option value="">-- Seleccione --</option>
        <option value="Juan Pérez">Juan Pérez</option>
        <option value="María Gómez">María Gómez</option>
        <option value="Carlos López">Carlos López</option>
    </select>

    <label>Salario Base:</label>
    <input type="number" id="salario" placeholder="Ej: 2000000">

    <label>Días trabajados:</label>
    <input type="number" id="dias" placeholder="Ej: 30">

    <button onclick="generarDesprendible()">Generar</button>
    <button onclick="descargarPDF()">Descargar PDF</button>

    <div id="desprendible" class="desprendible">
        <!-- Aquí se genera el desprendible -->
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
<script src="/js/nomina.js"></script>

</body>
</html>
