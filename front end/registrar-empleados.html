<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Empleado</title>
    <link rel="stylesheet" href="/css/registrar-empleados.css">
</head>
<body>

<div class="container">

    <h1>Registro de Empleado</h1>

    <form id="employeeForm">

        <div class="form-grid">

            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="form-group">
                <label>Cédula</label>
                <input type="text" id="cedula" required>
            </div>

            <div class="form-group">
                <label>Correo</label>
                <input type="email" id="correo" required>
            </div>

            <div class="form-group">
                <label>Cargo</label>
                <input type="text" id="cargo" required>
            </div>

            <div class="form-group">
                <label>Salario</label>
                <input type="number" id="salario" required>
            </div>

            <div class="form-group">
                <label>Fecha de Ingreso</label>
                <input type="date" id="fechaIngreso" required>
            </div>

        </div>

        <div class="form-group">
            <label>Foto del Empleado</label>
            <input type="file" id="foto" accept="image/*">
            <img id="preview" class="preview-img">
        </div>

        <div class="form-group">
            <label>Documentos (PDF, Word, etc)</label>
            <input type="file" id="documentos" multiple>
            <ul id="fileList"></ul>
        </div>

        <button type="submit" class="btn">Registrar Empleado</button>

    </form>

    <hr>

    <h2>Lista de Empleados Registrados</h2>

    <div id="employeeList"></div>

</div>

<script src="script.js"></script>
</body>
</html>
